# ──────────────────────────────────────────────────────────────────────────────
# Run identity
# ──────────────────────────────────────────────────────────────────────────────
run_name: "baseline_unet"
seed: 42
device: "cuda"   # "cuda" | "cpu"

# ──────────────────────────────────────────────────────────────────────────────
# Data
# ──────────────────────────────────────────────────────────────────────────────
data_root: "data"
img_size: 256
batch_size: 4
num_workers: 2

splits:
  train: "data/train"
  val:   "data/val"
  test:  "data/test"

# Optional explicit sub-folder overrides (leave null = auto-discover).
# Paths are relative to each split root (e.g. data/train/).
folders:
  eo_pre:     null
  eo_post:    null
  sar_pre:    null
  sar_post:   null
  mask:       null
  pre_event:  null
  post_event: null
  target:     null

# ──────────────────────────────────────────────────────────────────────────────
# Model
# ──────────────────────────────────────────────────────────────────────────────
dropout_p: 0.3   # used for MC-Dropout uncertainty estimation at eval time

# ──────────────────────────────────────────────────────────────────────────────
# Training
# ──────────────────────────────────────────────────────────────────────────────
epochs: 10
lr: 0.0003
weight_decay: 0.00001

# Cosine annealing LR scheduler — restarts every T_0 epochs, multiplies period by T_mult.
# Set lr_scheduler: null to disable.
lr_scheduler: "cosine"   # "cosine" | null
lr_T0: 10                # first restart period (epochs)
lr_T_mult: 2             # period doubles after each restart: 10, 20, 40 …
lr_eta_min: 0.00001      # minimum LR at trough

# Geometric + photometric augmentations on training patches (hflip, vflip, rot90,
# brightness, contrast, Gaussian noise).  Val/test are never augmented.
augment: true

# BCEWithLogitsLoss pos_weight — higher value → penalises missed changes more.
pos_weight: 5.0

# Weighted sampler: patches with change pixels are upsampled.
# Set to 0 to use plain random shuffling.
change_weight_multiplier: 5.0

# After training: sweep decision threshold on val set and save best to checkpoint.
threshold_sweep: true

# Checkpointing
save_every: 1
metric_for_best: "f1"   # "f1" | "iou"

# ──────────────────────────────────────────────────────────────────────────────
# Evaluation  (used by eval.py)
# ──────────────────────────────────────────────────────────────────────────────
# 8-fold test-time augmentation (D4 group: identity + 3 rotations + 4 reflections).
tta: true

# MC-Dropout inference passes (0 = disabled).
mc_dropout_passes: 30

# Number of qualitative visualisation examples to save (mix success/failure).
num_vis_samples: 10
